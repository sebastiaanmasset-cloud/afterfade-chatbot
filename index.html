<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; height: 100vh; display: flex; flex-direction: column; }
#header { background: #1a1a1a; color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.av { width: 36px; height: 36px; border-radius: 50%; background: #e0a800; color: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.hname { font-size: 14px; font-weight: 600; }
.hstatus { font-size: 11px; color: #aaa; }
#messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 7px; align-items: flex-end; }
.msg.user { flex-direction: row-reverse; }
.bubble { max-width: 78%; padding: 9px 13px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; }
.msg.bot .bubble { background: #fff; border: 1px solid #e5e5e3; border-bottom-left-radius: 4px; color: #1a1a1a; }
.msg.user .bubble { background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }
.mav { width: 26px; height: 26px; border-radius: 50%; background: #e0a800; color: #1a1a1a; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.typing { display: flex; align-items: center; gap: 4px; padding: 9px 13px; background: #fff; border: 1px solid #e5e5e3; border-radius: 16px; border-bottom-left-radius: 4px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #999; animation: bn 1.2s infinite; }
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#qbtns { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 5px; background: #f5f5f3; border-top: 1px solid #e5e5e3; }
.qb { font-size: 11.5px; padding: 5px 10px; border: 1px solid #ccc; border-radius: 20px; background: #fff; color: #444; cursor: pointer; }
.qb:hover { background: #f0f0ee; }
#irow { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #e5e5e3; background: #fff; }
#inp { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 13.5px; background: #f9f9f7; color: #1a1a1a; outline: none; }
#snd { width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#snd svg { width: 16px; height: 16px; fill: #fff; }
#foot { text-align: center; font-size: 10px; color: #aaa; padding: 5px; background: #fff; border-top: 1px solid #eee; }
</style>
</head>
